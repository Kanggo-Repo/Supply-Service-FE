x-service-env: &service_env
  APP_ENV: ${APP_ENV:-production}
  APP_DEBUG: ${APP_DEBUG:-false}
  DB_CONNECTION: mysql
  DB_HOST: ${DB_HOST:-db_app_baru}
  DB_PORT: ${DB_PORT:-3306}
  DB_DATABASE: ${DB_DATABASE:-supply_service_fe}
  DB_USERNAME: ${DB_USERNAME:-laravel}
  DB_PASSWORD: ${DB_PASSWORD:-secret}
  REDIS_HOST: ${REDIS_HOST:-redis}
  REDIS_PORT: ${REDIS_PORT:-6379}
  CACHE_STORE: ${CACHE_STORE:-redis}
  SESSION_DRIVER: ${SESSION_DRIVER:-redis}
  QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
  TELESCOPE_ENABLED: ${TELESCOPE_ENABLED:-false}
  OCTANE_SERVER: ${OCTANE_SERVER:-frankenphp}
  # FrankenPHP/Caddy runs as www-data; point its config/data home at an
  # ephemeral, writable, NON-mounted path so it never writes container-owned
  # files into the bind-mounted storage volume. TLS terminates at nginx.
  XDG_CONFIG_HOME: /tmp/caddy
  XDG_DATA_HOME: /tmp/caddy

services:
  supplyfe_blue:
    build:
      context: ${APP_ROOT:-.}
      dockerfile: Dockerfile.production
      network: host
      args:
        PHP_VERSION: ${PHP_VERSION:-8.3}
    container_name: supplyfe_blue
    restart: always
    command: php artisan octane:start --server=frankenphp --host=0.0.0.0 --port=8000 --workers=auto --max-requests=500
    expose:
      - "8000"
    environment:
      <<: *service_env
    env_file:
      - ${APP_ROOT:-.}/.env
    volumes:
      - ${APP_ROOT:-.}/.env:/var/www/html/.env:ro
      - ${APP_ROOT:-.}/storage:/var/www/html/storage
    networks:
      - frontend
      - backend
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/up || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  supplyfe_green:
    build:
      context: ${APP_ROOT:-.}
      dockerfile: Dockerfile.production
      network: host
      args:
        PHP_VERSION: ${PHP_VERSION:-8.3}
    container_name: supplyfe_green
    restart: always
    command: php artisan octane:start --server=frankenphp --host=0.0.0.0 --port=8000 --workers=auto --max-requests=500
    expose:
      - "8000"
    environment:
      <<: *service_env
    env_file:
      - ${APP_ROOT:-.}/.env
    volumes:
      - ${APP_ROOT:-.}/.env:/var/www/html/.env:ro
      - ${APP_ROOT:-.}/storage:/var/www/html/storage
    networks:
      - frontend
      - backend
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/up || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  queue:
    build:
      context: ${APP_ROOT:-.}
      dockerfile: Dockerfile.production
      network: host
      args:
        PHP_VERSION: ${PHP_VERSION:-8.3}
    container_name: supplyfe_queue
    restart: always
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    environment:
      <<: *service_env
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
    env_file:
      - ${APP_ROOT:-.}/.env
    volumes:
      - ${APP_ROOT:-.}/.env:/var/www/html/.env:ro
      - ${APP_ROOT:-.}/storage:/var/www/html/storage
    networks:
      - backend
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  scheduler:
    build:
      context: ${APP_ROOT:-.}
      dockerfile: Dockerfile.production
      network: host
      args:
        PHP_VERSION: ${PHP_VERSION:-8.3}
    container_name: supplyfe_scheduler
    restart: always
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    environment:
      <<: *service_env
    env_file:
      - ${APP_ROOT:-.}/.env
    volumes:
      - ${APP_ROOT:-.}/.env:/var/www/html/.env:ro
      - ${APP_ROOT:-.}/storage:/var/www/html/storage
    networks:
      - backend
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

networks:
  frontend:
    external: true
    name: dck_frontend
  backend:
    external: true
    name: dck_backend
