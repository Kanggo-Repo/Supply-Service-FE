x-service-env: &service_env
  APP_ENV: ${APP_ENV:-production}
  APP_DEBUG: ${APP_DEBUG:-false}
  DB_CONNECTION: mysql
  DB_HOST: ${DB_HOST:-db_app_baru}
  DB_PORT: ${DB_PORT:-3306}
  DB_DATABASE: ${DB_DATABASE:-supply_service_fe}
  DB_USERNAME: ${DB_USERNAME:-laravel}
  DB_PASSWORD: ${DB_PASSWORD:-secret}
  REDIS_HOST: ${REDIS_HOST:-redis}
  REDIS_PORT: ${REDIS_PORT:-6379}
  CACHE_STORE: ${CACHE_STORE:-redis}
  SESSION_DRIVER: ${SESSION_DRIVER:-redis}
  QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
  TELESCOPE_ENABLED: ${TELESCOPE_ENABLED:-false}

services:
  app_blue:
    build:
      context: ${APP_ROOT:-.}
      dockerfile: Dockerfile.production
      args:
        PHP_VERSION: ${PHP_VERSION:-8.3}
    container_name: supplyfe_blue
    restart: always
    environment:
      <<: *service_env
    env_file:
      - ${APP_ROOT:-.}/.env
    volumes:
      - ${APP_ROOT:-.}/.env:/var/www/html/.env:ro
      - ${APP_ROOT:-.}/storage:/var/www/html/storage
    networks:
      - frontend
      - backend
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  app_green:
    build:
      context: ${APP_ROOT:-.}
      dockerfile: Dockerfile.production
      args:
        PHP_VERSION: ${PHP_VERSION:-8.3}
    container_name: supplyfe_green
    restart: always
    environment:
      <<: *service_env
    env_file:
      - ${APP_ROOT:-.}/.env
    volumes:
      - ${APP_ROOT:-.}/.env:/var/www/html/.env:ro
      - ${APP_ROOT:-.}/storage:/var/www/html/storage
    networks:
      - frontend
      - backend
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  queue:
    build:
      context: ${APP_ROOT:-.}
      dockerfile: Dockerfile.production
      args:
        PHP_VERSION: ${PHP_VERSION:-8.3}
    container_name: supplyfe_queue
    restart: always
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    environment:
      <<: *service_env
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
    env_file:
      - ${APP_ROOT:-.}/.env
    volumes:
      - ${APP_ROOT:-.}/.env:/var/www/html/.env:ro
      - ${APP_ROOT:-.}/storage:/var/www/html/storage
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  scheduler:
    build:
      context: ${APP_ROOT:-.}
      dockerfile: Dockerfile.production
      args:
        PHP_VERSION: ${PHP_VERSION:-8.3}
    container_name: supplyfe_scheduler
    restart: always
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    environment:
      <<: *service_env
    env_file:
      - ${APP_ROOT:-.}/.env
    volumes:
      - ${APP_ROOT:-.}/.env:/var/www/html/.env:ro
      - ${APP_ROOT:-.}/storage:/var/www/html/storage
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

networks:
  frontend:
    external: true
    name: dck_frontend
  backend:
    external: true
    name: dck_backend

