services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: supply-service-fe-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_URL: ${APP_URL:-http://localhost:8009}
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${COMPOSE_DB_DATABASE:-supply_service_fe}
      DB_USERNAME: ${COMPOSE_DB_USERNAME:-laravel}
      DB_PASSWORD: ${COMPOSE_DB_PASSWORD:-secret}
      CACHE_STORE: ${CACHE_STORE:-database}
      SESSION_DRIVER: ${SESSION_DRIVER:-database}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-database}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8009:8000"
    volumes:
      - ./:/var/www/html
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: supply-service-fe-queue
    restart: unless-stopped
    profiles: ["worker"]
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_URL: ${APP_URL:-http://localhost:8009}
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${COMPOSE_DB_DATABASE:-supply_service_fe}
      DB_USERNAME: ${COMPOSE_DB_USERNAME:-laravel}
      DB_PASSWORD: ${COMPOSE_DB_PASSWORD:-secret}
      CACHE_STORE: ${CACHE_STORE:-database}
      SESSION_DRIVER: ${SESSION_DRIVER:-database}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-database}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--max-time=3600"]
    volumes:
      - ./:/var/www/html
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: supply-service-fe-scheduler
    restart: unless-stopped
    profiles: ["worker"]
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_URL: ${APP_URL:-http://localhost:8009}
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${COMPOSE_DB_DATABASE:-supply_service_fe}
      DB_USERNAME: ${COMPOSE_DB_USERNAME:-laravel}
      DB_PASSWORD: ${COMPOSE_DB_PASSWORD:-secret}
      CACHE_STORE: ${CACHE_STORE:-database}
      SESSION_DRIVER: ${SESSION_DRIVER:-database}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-database}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    command: ["sh", "-lc", "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"]
    volumes:
      - ./:/var/www/html
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  vite:
    image: node:22-alpine
    container_name: supply-service-fe-vite
    restart: unless-stopped
    profiles: ["dev"]
    working_dir: /var/www/html
    command: ["sh", "-lc", "if [ ! -d node_modules ]; then npm install; fi && npm run dev -- --host 0.0.0.0 --port 5173"]
    ports:
      - "5176:5173"
    volumes:
      - ./:/var/www/html

  db:
    image: mysql:8.4
    container_name: supply-service-fe-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${COMPOSE_DB_DATABASE:-supply_service_fe}
      MYSQL_USER: ${COMPOSE_DB_USERNAME:-laravel}
      MYSQL_PASSWORD: ${COMPOSE_DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${COMPOSE_DB_ROOT_PASSWORD:-root}
    ports:
      - "3309:3306"
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: supply-service-fe-redis
    restart: unless-stopped
    ports:
      - "6389:6379"
    volumes:
      - redis-data:/data

volumes:
  db-data:
  redis-data:

